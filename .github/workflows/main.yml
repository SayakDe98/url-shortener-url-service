name: Deploy Backend
on:
  push:
    branches: [main]
env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: url-shortener
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v3

      # 2. Configure AWS
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 3. Login to ECR
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | docker login \
            --username AWS \
            --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

      # 4. Build Docker Image (with cache)
      - name: Build Docker Image
        run: |
          docker pull $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest || true
          docker build \
            --cache-from $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest \
            -t $ECR_REPOSITORY .

      # 5. Tag Image
      - name: Tag Docker Image
        run: |
          docker tag $ECR_REPOSITORY:latest \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest

      # 6. Push Image
      - name: Push Docker Image
        run: |
          docker push \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest

      # 7. Clean up old/untagged images from ECR
      - name: Clean Old ECR Images
        run: |
          IMAGE_IDS=$(aws ecr list-images \
            --repository-name $ECR_REPOSITORY \
            --region $AWS_REGION \
            --filter tagStatus=UNTAGGED \
            --query 'imageIds[*]' \
            --output json)

          if [ "$IMAGE_IDS" != "[]" ]; then
            aws ecr batch-delete-image \
              --repository-name $ECR_REPOSITORY \
              --region $AWS_REGION \
              --image-ids "$IMAGE_IDS"
            echo "Deleted untagged images."
          else
            echo "No untagged images to delete."
          fi

      # 8. Deploy to EC2 via SSH
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_REGION,ECR_REPOSITORY,AWS_ACCOUNT_ID
          script: |
            set -e
            IMAGE=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:latest
            echo "Using image: $IMAGE"

            # Login to ECR from EC2
            aws ecr get-login-password --region $AWS_REGION | docker login \
              --username AWS \
              --password-stdin ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com

            # Pull latest image
            docker pull $IMAGE

            # Create shared Docker network if it doesn't exist
            docker network create url-shortener-net || true

            # Start Redis if not already running
            if [ ! "$(docker ps -q -f name=redis)" ]; then
              docker run -d \
                --name redis \
                --network url-shortener-net \
                --restart always \
                -v redis-data:/data \
                redis:7-alpine redis-server --appendonly yes
              echo "Redis started."
            else
              echo "Redis already running, skipping."
            fi

            # Stop old Go container
            docker stop url-shortener || true
            docker rm url-shortener || true

            # Create .env file
            cat <<EOF > /home/${USER}/.env
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            DB_URL=${{ secrets.DB_URL }}
            API_URL=${{ secrets.API_URL }}
            REDIS_URL=redis://redis:6379
            APP_ENV=production
            EOF

            # Run Go container on the same network
            docker run -d -p 8080:8080 \
              --name url-shortener \
              --network url-shortener-net \
              --restart always \
              --env-file /home/${USER}/.env \
              $IMAGE

            echo "Deployment complete."